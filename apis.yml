aid: chief-acquisition-officers-council
name: Chief Acquisition Officers Council
x-type: government
description: >-
  The Chief Acquisition Officers Council (CAOC) is a senior interagency
  forum established pursuant to Section 16 of the Office of Federal
  Procurement Policy Act (41 USC 1311). The Council brings together the
  Chief Acquisition Officers (CAOs), the Under Secretary of Defense for
  Acquisition and Sustainment, and the Senior Procurement Executives of
  Executive Branch agencies to monitor and improve the federal
  acquisition system, promote effective business practices, deliver
  best-value products and services, and further integrity, fairness,
  competition, and openness in federal procurement. The CAOC publishes
  resources, charters, working group output, and guidance through
  Acquisition.gov, and operates alongside the Federal Acquisition
  Regulatory Council and the Office of Management and Budget's Office of
  Federal Procurement Policy (OFPP).
